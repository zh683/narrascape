segments:
  - id: 1
    shot_type: establishing
    text: "彼得堡的天空压得很低。运河边的黄墙、潮湿的石路和来往的人声，把拉斯科尔尼科夫挤成街角一小块阴影；他还没有犯罪，城市却像已经听见了他的念头。"
  - id: 2
    shot_type: medium
    text: "他的房间窄得像临时钉起来的棺木。书、破杯、旧衣和斜屋顶挤在一起；他把外套扣紧，让某个硬物只在衣襟下留下不自然的形状，然后站住，像在等另一个自己先走出去。"
  - id: 3
    shot_type: close_up
    text: "当铺老板娘没有完全打开门。门链、钥匙、烛火和她怀疑的眼睛挡在中间；拉斯科尔尼科夫说着准备好的话，声音却比理论更薄。"
  - id: 4
    shot_type: detail
    text: "真正发生的事没有留在画面中央。钥匙落进旧地毯，椅子撞歪，烛焰轻轻摇晃；一只年轻的手从画面边缘缩回去，忽然不知道该藏在哪里。"
  - id: 5
    shot_type: medium
    text: "他把偷来的小东西塞进院角的石头下面。石头合上时，没有胜利，也没有自由；只有他自己的呼吸贴着耳朵，像一个终于醒来的证人。"
  - id: 6
    shot_type: wide_env
    text: "热病把街道拉长成没有出口的走廊。他在人群里走，觉得每张脸都只是偶然看了他一眼，又都准确地看见了他最想遮住的地方。"
  - id: 7
    shot_type: two_shot
    text: "波尔菲里没有拍桌子，也没有逼近。他只是礼貌地笑着谈文章、谈例外的人、谈血迹之后的逻辑；拉斯科尔尼科夫坐在椅子上，第一次觉得空气比审判更紧。"
  - id: 8
    shot_type: close_up
    text: "索尼娅的房间贫穷，却没有驱赶人的冷。蜡烛在两人之间燃着，她胸前的小十字架微微发亮；她听见他的破碎，不急着替他说一句好听的话。"
  - id: 9
    shot_type: medium
    text: "承认不是从嘴里开始的。它先出现在手指松开的瞬间，出现在他不再四处寻找出口的眼睛里；索尼娅仍然坐着，像守住一盏不肯熄灭的灯。"
  - id: 10
    shot_type: wide_env
    text: "广场的石头被雨洗得发黑。拉斯科尔尼科夫走到人群中，慢慢弯下身；他不是向城市表演忏悔，而是把自己从一个冷冰冰的思想里交还给人。"
  - id: 11
    shot_type: wide_env
    text: "西伯利亚没有替他解释，也没有立刻宽恕。雪、木栅、灰色河岸和沉默的囚徒，一天天磨掉他关于例外的骄傲，只留下必须继续活下去的清醒。"
  - id: 12
    shot_type: detail
    text: "黎明很淡。索尼娅站在远处，拉斯科尔尼科夫低头碰到胸前的小十字架；惩罚还没有结束，但他第一次没有急着为自己辩护。"
