segments:
  - id: 1
    shot_type: establishing
    text: "彼得堡的夏天像一只合拢的手。运河发出潮湿的气味，黄墙把天空压低，拉斯科尔尼科夫在街角停住，仿佛整座城市已经知道他将要想什么。"
  - id: 2
    shot_type: medium
    text: "他的房间窄得像一只盒子。书堆、破杯、旧外套和斜斜的屋顶挤在一起。他把斧头藏进衣襟，动作轻得像在替一个陌生人整理衣服。"
  - id: 3
    shot_type: close_up
    text: "当铺老板娘隔着门链看他。钥匙在她腰间发出细响，烛火照见她怀疑的眼睛，也照见他脸上那种被理论磨硬的苍白。"
  - id: 4
    shot_type: detail
    text: "真正发生的事没有停在画面中央。椅子倒下，钥匙落在地毯上，一只手从画面边缘颤抖着收回去。房间忽然比刚才更安静。"
  - id: 5
    shot_type: medium
    text: "他把偷来的小东西埋在石头下面，却没有得到任何自由。每一枚纽扣、每一阵脚步声、每一次有人回头，都像在替死者继续呼吸。"
  - id: 6
    shot_type: wide_env
    text: "热病把彼得堡变成一条没有出口的走廊。他在人群中走着，听见自己的名字仿佛从每一扇门后传来，又立刻被车轮和雨水碾碎。"
  - id: 7
    shot_type: two_shot
    text: "波尔菲里没有高声逼问。他只是笑着挪动椅子，谈一篇文章，谈人的种类，谈那些自以为可以越过血迹的人。拉斯科尔尼科夫忽然觉得空气不够用。"
  - id: 8
    shot_type: close_up
    text: "索尼娅的房间很穷，却没有那种让人逃走的冷。她听他说话，胸前的小十字架在烛光里微微发亮，好像沉默也可以承担别人的重量。"
  - id: 9
    shot_type: medium
    text: "承认在他说出口以前就开始了。它先出现在手指的松开里，出现在眼睛不再寻找退路的那一刻，出现在他终于不能继续把自己称作例外的时候。"
  - id: 10
    shot_type: wide_env
    text: "广场的石头被雨洗得发黑。他走到人群中间，弯下身去，仿佛不是向城市认罪，而是把自己从一个冰冷的思想里交还给人间。"
  - id: 11
    shot_type: wide_env
    text: "西伯利亚没有替他解释什么。雪地、木栅、灰色的河岸和沉默的囚徒，只一天天削去他的骄傲，留下更难忍受也更真实的清醒。"
  - id: 12
    shot_type: detail
    text: "黎明时，索尼娅站在远处。拉斯科尔尼科夫低头摸到胸前的十字架，第一次没有急着为自己辩护。惩罚还没有结束，但良心终于开始说话。"
