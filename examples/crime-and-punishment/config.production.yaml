project:
  name: "crime-and-punishment"
  title: "罪与罚"
  subtitle: "A Narrascape literary AI-film rebuild"
  author: "Narrascape"
  year: 2026
  series: "Narrascape First Film"
  episode: 1
  script_file: "scripts/script.yaml"
  segment_count: 12
  style: "psychological literary feature film"

pipeline:
  name: "ai-film-production"
  category: "public_domain_literary_drama"
  version: "3.0"
  design_overwrite: false
  video_generation: required
  strict_director: true
  auto_rework: true
  max_rework_cycles: 2

llm:
  mode: ai_assistant
  temperature: 0.58
  max_tokens: 6000

tts:
  provider: local
  model: "speech-2.8-hd"
  voice_id: "male-qn-jingying"
  speed: 0.84
  pitch: -2
  vol: 1.0
  sample_rate: 32000
  continuous_sound: true
  text_normalization: true
  language_boost: "Chinese"
  add_pauses: true

images:
  provider: seedream
  model: "doubao-seedream-5-0-260128"
  style: "Oil painting style, 1860s Saint Petersburg psychological literary feature film as painterly cinematic frames; visible brush texture, layered pigments, canvas grain, cramped yellow rooms, wet cobblestones, canal fog, candle and window light, worn period clothing, gaunt faces, moral pressure, rich chiaroscuro; not photorealistic photography, not anime, not cartoon, no readable text, no platform label, no watermark."
  aspect_ratio: "16:9"
  width: 1920
  height: 1080
  count: 12

video:
  provider: seedance
  model: "jimeng-video-seedance-2.0"
  resolution: "720p"
  ratio: "16:9"
  duration: 5
  frame_rate: 24
  takes: 3

visual:
  type: "film_timeline"
  zoom_rate: 0.00045
  zoom_cap: 1.08
  fade_in_duration: 0.8
  supersample: auto
  segment_gap: 0.55
  gap_map:
    4: 0.9
    7: 0.8
    10: 1.0

subtitles:
  engine: srt
  font: "Microsoft YaHei"
  font_size: 24
  max_chars_per_line: 18
  strip_punctuation: true
  alignment: 2
  primary_color: "&H00FFFFFF"
  outline_color: "&H00000000"
  outline: 2
  shadow: 1
  margin_v: 60

audio:
  narration:
    provider: local
    format: mp3
    sample_rate: 32000
  music:
    provider: local
    model: "music-2.6-free"
    sample_rate: 44100
    bitrate: 256000
    volume: 0.2
    music_boost_db: 1.5
    sidechain_threshold: 0.05
    sidechain_ratio: 3
    sidechain_attack: 20
    sidechain_release: 600
    narration_lufs: -16
    target_lufs: -14
    fade_out_seconds: 5

bgm_map:
  zone_crossfade: 1.2
  zones:
    - id: bgm_pressure
      covers: [1, 4]
      label: "Petersburg Pressure"
      prompt: "Low cello, muted piano, distant city rumble, humid psychological pressure, 50 BPM, D minor, no melody hook"
      min_duration: 70
    - id: bgm_fever
      covers: [5, 7]
      label: "Fever Logic"
      prompt: "Prepared piano pulses, thin strings, unstable breath texture, restrained dread, 58 BPM, F minor"
      min_duration: 70
    - id: bgm_mercy
      covers: [8, 10]
      label: "Mercy and Confession"
      prompt: "Soft harmonium, solo cello, candlelit restraint, slow moral surrender, 46 BPM, A minor"
      min_duration: 70
    - id: bgm_dawn
      covers: [11, 12]
      label: "Siberian Dawn"
      prompt: "Sparse strings, low piano, cold dawn air, distant non-lyrical choir pad, austere hope, 42 BPM, E minor"
      min_duration: 55

encode:
  width: 1920
  height: 1080
  fps: 24
  crf: 18
  preset: "medium"
  codec: "libx264"
  audio_codec: "aac"
  audio_bitrate: "192k"

ending:
  enabled: false

budget:
  total_usd: 0.0
  mode: observe
  per_action_threshold: 0.0
  images_estimated: 0.0
  video_estimated: 0.0
  tts_estimated: 0.0
  music_estimated: 0.0
