name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install FFmpeg on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check src tests
      - name: Format check with black
        run: black --check src tests
      - name: Type check source with mypy
        run: mypy
      - name: Run tests with coverage gate
        run: pytest --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: runner.os == 'Linux' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  distributions:
    name: Install ${{ matrix.distribution }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distribution: [wheel, sdist]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install into a clean environment
        shell: bash
        run: |
          python -m venv .dist-venv
          .dist-venv/bin/python -m pip install --upgrade pip
          if [[ "${{ matrix.distribution }}" == "wheel" ]]; then
            .dist-venv/bin/python -m pip install dist/*.whl
          else
            .dist-venv/bin/python -m pip install dist/*.tar.gz
          fi
          .dist-venv/bin/python -c "import narrascape; print(narrascape.__version__)"
          .dist-venv/bin/python -c "from importlib.resources import files; assert files('narrascape').joinpath('workbench_web/index.html').is_file()"
          .dist-venv/bin/narrascape --help

  docker:
    name: Production Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: false
          tags: narrascape:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  browser:
    name: Workbench browser smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Workbench runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[workbench]"
      - name: Build Workbench
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run browser tests
        working-directory: web
        run: npm run test:e2e
